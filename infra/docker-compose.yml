version: "3.9"
services:
  api:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../:/workspace
    command: sh -c "pip install -e . && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  web:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../:/workspace
    environment:
      - API_BASE_URL=http://api:8000
    command: sh -c "pip install -e . && streamlit run apps/web/dashboard.py --server.address 0.0.0.0 --server.port 8501"
    ports:
      - "8501:8501"
    depends_on:
      - api
